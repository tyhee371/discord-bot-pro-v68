# PostgreSQL Client Authentication Configuration File
# Custom config for discord-bot — allows connections from Docker network and host

# Unix socket connections (container-internal)
local   all             all                                     trust

# IPv4 localhost
host    all             all             127.0.0.1/32            trust

# IPv6 localhost  
host    all             all             ::1/128                 trust

# Docker internal network (172.x.x.x)
hostnossl   all         all             172.0.0.0/8             md5

# Host machine via host.docker.internal (192.168.x.x)
hostnossl   all         all             192.168.0.0/16          md5

# All other connections (production/remote)
host        all         all             all                     scram-sha-256

# Replication
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             ::1/128                 trust
